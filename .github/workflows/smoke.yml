name: Smoke Tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'API base URL to smoke-test'
        required: false
        default: 'https://studr-production.up.railway.app'
  # Also run automatically after a successful deploy (triggered by test.yml on main)
  workflow_run:
    workflows: ['Tests']
    branches: [main]
    types: [completed]

jobs:
  smoke:
    name: Production Smoke
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Run smoke tests
        env:
          BASE_URL: ${{ inputs.base_url || 'https://studr-production.up.railway.app' }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: node server/scripts/smoke.js
